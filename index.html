<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumen Flora</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050508;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #fps {
        position: fixed;
        top: 12px;
        left: 12px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 11px;
        color: rgba(180, 220, 200, 0.6);
        pointer-events: none;
        z-index: 10;
        letter-spacing: 0.05em;
      }
      #hint {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        font-family: system-ui, sans-serif;
        font-size: 12px;
        color: rgba(180, 200, 190, 0.35);
        pointer-events: none;
        z-index: 10;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(5, 5, 8, 0.92);
        z-index: 20;
      }
      .overlay-card {
        text-align: center;
        max-width: 360px;
        padding: 2rem;
      }
      .overlay-card h1 {
        font-family: system-ui, sans-serif;
        font-weight: 300;
        font-size: 1.75rem;
        color: rgba(200, 230, 210, 0.9);
        letter-spacing: 0.08em;
        margin-bottom: 0.75rem;
      }
      .overlay-card p,
      .overlay-msg {
        font-family: system-ui, sans-serif;
        font-size: 0.9rem;
        color: rgba(160, 190, 175, 0.55);
        line-height: 1.5;
        margin-bottom: 1.5rem;
      }
      #start-btn {
        font-family: system-ui, sans-serif;
        font-size: 0.85rem;
        letter-spacing: 0.06em;
        color: rgba(200, 240, 220, 0.9);
        background: rgba(30, 60, 50, 0.6);
        border: 1px solid rgba(120, 200, 160, 0.25);
        border-radius: 4px;
        padding: 0.65rem 1.4rem;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
      }
      #start-btn:hover {
        background: rgba(40, 80, 65, 0.8);
        border-color: rgba(140, 220, 180, 0.4);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="overlay"></div>
    <div id="fps">— fps</div>
    <div id="hint">press <kbd>h</kbd> to toggle controls</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
